services:
  api:
    build: backend
    entrypoint: /app/path_api
    networks:
      - path_network
    environment:
      DATABASE_URL: "postgresql://wave:123123@path-db-1:5432/path?sslmode=disable"
      SECRET: "mypath"
    ports:
      - 3000:3000
    depends_on:
      - db
    restart: unless-stopped
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: wave
      POSTGRES_PASSWORD: 123123
      POSTGRES_DB: path
    networks:
      - path_network
    ports:
      - 5433:5432
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
  frontend:
    entrypoint: node /app/build/index.js
    build: frontend
    networks:
      - path_network
    ports:
      - 3001:3000

networks:
  path_network:
    driver: bridge

volumes:
  pg_data:
