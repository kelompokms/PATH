services:
  migrations:
    build: backend/internal/db
    profiles:
      - dev
    env_file: .env
    networks:
      - network
    depends_on:
      - db
    command: sleep infinity

  api:
    build: backend
    entrypoint: /app/path_api
    networks:
      - network
    env_file: .env
    ports:
      - 3000:3000
    depends_on:
      - db
    restart: unless-stopped
  db:
    image: postgres:18-alpine
    env_file: .env
    networks:
      - network
    ports:
      - 5433:5432
    volumes:
      - pg_data:/var/lib/postgresql
    restart: unless-stopped
  frontend:
    entrypoint: node /app/build/index.js
    build: frontend
    networks:
      - network
    ports:
      - 3001:3000

networks:
  network:
    driver: bridge

volumes:
  pg_data:
